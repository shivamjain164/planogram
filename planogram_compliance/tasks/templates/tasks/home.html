{% include "base.html" %}

{% block body %}
{% for task in task_applicable %}
<table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Title</th>
     
      <th scope="col">Created Date</th>
      <th scope="col">Deadline</th>
    </tr>
  </thead>
  <tbody>
    
    <tr>
      <th scope="row">{{task.id}}</th>
      
      <td><a href="{% url "task_view_1" task.id %}">{{task.title}}</a></td>
      
      <td>{{task.modified_time|date:"d-m-Y"}}</td>
      <td>{{task.deadline|date:"d-m-Y"}}</td>
    </tr>

  </tbody>
{% endfor %}
{% endblock body %}
