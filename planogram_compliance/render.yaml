databases:
  - name: planogram_compliancedb
    plan: free
    databaseName: planogram_compliance
    user: planogram_compliance

services:
  - type: web
    plan: free
    name: planogram_compliance
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn planogram_compliance.asgi:application -k uvicorn.workers.UvicornWorker' 
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: planogram_compliancedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
